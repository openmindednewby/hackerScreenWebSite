server {
    listen 0.0.0.0:80;
    listen [::]:80;
    server_name  localhost;

    location / {
        root   /webgl;
        index  index.html;
    }

    # HTML entry must NEVER be cached: revalidate every load so a redeploy is
    # picked up on the next navigation (the no-service-worker auto-update fix).
    # Static site — asset filenames are NOT content-hashed, so do NOT add any
    # immutable caching here (that would silently serve stale builds).
    location ~* \.html$ {
        root   /webgl;
        add_header Cache-Control "no-cache";
    }

    error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}